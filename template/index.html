<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Car Price Predictor</title>

    <!-- Custom CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css">

</head>

<body class="bg-dark">

<div class="container">

    <div class="row">

        <div class="card mt-50"
             style="width:100%; margin-top:50px;">

            <!-- Header -->
            <div class="card-header">

                <h1 style="text-align:center;">
                    Welcome to Car Price Predictor
                </h1>

            </div>

            <!-- Body -->
            <div class="card-body">

                <div class="col-12"
                     style="text-align:center;">

                    <h5>
                        This app predicts the price of a car you want to sell.
                    </h5>

                </div>

                <br>

                <!-- Form -->
                <form method="post"
                      accept-charset="utf-8"
                      name="Modelform">

                    <!-- Company -->
                    <div class="col-md-10 form-group mx-auto"
                         style="text-align:center;">

                        <label>
                            <b>Select Company:</b>
                        </label>

                        <select class="form-control"
                                id="company"
                                name="company"
                                required="1"
                                onchange="load_car_models(this.id,'car_model')">

                            {% for company in companies %}

                            <option value="{{ company }}">
                                {{ company }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Car Model -->
                    <div class="col-md-10 form-group mx-auto"
                         style="text-align:center;">

                        <label>
                            <b>Select Model:</b>
                        </label>

                        <select class="form-control"
                                id="car_model"
                                name="car_model"
                                required="1">

                        </select>

                    </div>

                    <!-- Year -->
                    <div class="col-md-10 form-group mx-auto"
                         style="text-align:center;">

                        <label>
                            <b>Select Year Of Purchase:</b>
                        </label>

                        <select class="form-control"
                                id="year"
                                name="year"
                                required="1">

                            {% for year in years %}

                            <option value="{{ year }}">
                                {{ year }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Fuel Type -->
                    <div class="col-md-10 form-group mx-auto"
                         style="text-align:center;">

                        <label>
                            <b>Select Fuel Type:</b>
                        </label>

                        <select class="form-control"
                                id="fuel_type"
                                name="fuel_type"
                                required="1">

                            {% for fuel in fuel_types %}

                            <option value="{{ fuel }}">
                                {{ fuel }}
                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- Kilometers Driven -->
                    <div class="col-md-10 form-group mx-auto"
                         style="text-align:center;">

                        <label>
                            <b>Enter Number Of Kilometers Travelled:</b>
                        </label>

                        <input type="text"
                               class="form-control"
                               id="kilo_driven"
                               name="kilo_driven"
                               placeholder="Enter kilometers travelled">

                    </div>

                    <!-- Predict Button -->
                    <div class="col-md-10 form-group mx-auto"
                         style="text-align:center;">

                        <button type="button"
                                class="btn btn-primary form-control"
                                onclick="send_data()">

                            Predict Price

                        </button>

                    </div>

                </form>

                <br>

                <!-- Prediction Output -->
                <div class="row">

                    <div class="col-12"
                         style="text-align:center;">

                        <h3>
                            <span id="prediction"></span>
                        </h3>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

    function load_car_models(company_id, car_model_id)
    {
        var company = document.getElementById(company_id);

        var car_model = document.getElementById(car_model_id);

        car_model.innerHTML = "";

        {% for company in companies %}

            if(company.value == "{{ company }}")
            {

                {% for model in car_models %}

                    {% if company in model %}

                        var newOption =
                            document.createElement("option");

                        newOption.value = "{{ model }}";

                        newOption.innerHTML = "{{ model }}";

                        car_model.options.add(newOption);

                    {% endif %}

                {% endfor %}

            }

        {% endfor %}
    }


    function send_data()
    {
        var form = document.querySelector('form');

        var fd = new FormData(form);

        var xhr = new XMLHttpRequest();

        xhr.open('POST', '/predict', true);

        document.getElementById('prediction').innerHTML =
            "Wait! Predicting Price...";

        xhr.onreadystatechange = function()
        {
            if(xhr.readyState == XMLHttpRequest.DONE)
            {
                document.getElementById('prediction').innerHTML =
                    "Prediction: ₹ " + xhr.responseText;
            }
        }

        xhr.send(fd);
    }

</script>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.3/dist/umd/popper.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/js/bootstrap.min.js"></script>

</body>

</html>
